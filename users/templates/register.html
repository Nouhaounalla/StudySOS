{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySOS — Inscription</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    
<div class="card" id="register-box">
    <h1> StudySOS</h1>
    <p class="subtitle">Créez votre compte gratuitement</p>

    <div class="input-group">
        <input type="text" id="username" placeholder=" " oninput="validate('username')">
        <label for="username">Nom d'utilisateur</label>
        <span class="error-msg" id="username-err"></span>
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder=" " oninput="validate('email')">
        <label for="email">Email</label>
        <span class="error-msg" id="email-err"></span>
    </div>

    <div class="input-group">
        <input type="text" id="phone" placeholder=" ">
        <label for="phone">Téléphone (optionnel)</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder=" " oninput="validate('password')">
        <label for="password">Mot de passe</label>
        <span class="error-msg" id="password-err"></span>
    </div>

    <button id="submit-btn" onclick="register()">S'inscrire</button>

    <div class="message" id="message"></div>

    <div class="login-link">Déjà inscrit ?
        <a href="#" id="show-login">Se connecter</a>
    </div>
</div>

<div class="card" id="login-box" style="display:none;">
    <h1>Connexion</h1>
    <p class="subtitle">Heureux de vous revoir </p>

    <div class="input-group">
        <input type="email" id="login-email" placeholder=" ">
        <label for="login-email">Email</label>
    </div>

    <div class="input-group">
        <input type="password" id="login-password" placeholder=" ">
        <label for="login-password">Mot de passe</label>
    </div>

    <button onclick="login()">Se connecter</button>

    <div class="login-link">Pas encore de compte ?
        <a href="#" id="show-register">Créer un compte</a>
    </div>
</div>




    <script>
        const regBox = document.getElementById("register-box");
const logBox = document.getElementById("login-box");

document.getElementById("show-login").onclick = function (e) {
    e.preventDefault();

    // Animate register box out to the left
    regBox.classList.remove("slide-in-right", "slide-in-left");
    regBox.classList.add("slide-out-left");

    setTimeout(() => {
        regBox.style.display = "none";
        logBox.style.display = "block";

        // Animate login box in from the right
        logBox.classList.remove("slide-out-right", "slide-out-left");
        logBox.classList.add("slide-in-right");
    }, 450);
};

document.getElementById("show-register").onclick = function (e) {
    e.preventDefault();

    // Animate login box out to the right
    logBox.classList.remove("slide-in-left", "slide-in-right");
    logBox.classList.add("slide-out-right");

    setTimeout(() => {
        logBox.style.display = "none";
        regBox.style.display = "block";

        // Animate register box in from the left
        regBox.classList.remove("slide-out-left", "slide-out-right");
        regBox.classList.add("slide-in-left");
    }, 450);
};

        function validate(field) {
            const input = document.getElementById(field);
            const err = document.getElementById(field + '-err');
            const group = input.parentElement;

            let msg = '';

            if (field === 'username') {
                if (input.value.length < 3) msg = 'Au moins 3 caractères requis.';
            }
            if (field === 'email') {
                if (!input.value.includes('@') || !input.value.includes('.'))
                    msg = 'Adresse email invalide.';
            }
            if (field === 'password') {
                if (input.value.length < 8) msg = 'Au moins 8 caractères requis.';
            }

            if (msg) {
                err.textContent = msg;
                group.classList.add('invalid');
                group.classList.remove('valid');
            } else {
                err.textContent = '';
                group.classList.remove('invalid');
                group.classList.add('valid');
            }
        }

        async function register() {
            // Validate all fields first
            ['username', 'email', 'password'].forEach(validate);

            const invalids = document.querySelectorAll('.input-group.invalid');
            if (invalids.length > 0) return;

            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');

            // Animate button
            btn.classList.add('loading');
            btn.textContent = 'Inscription...';

            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    btn.textContent = 'Compte créé !';
                    window.location.href = "/api/profile-page/";
                    btn.classList.remove('loading');
                    btn.classList.add('success-btn');
                    msg.textContent = 'Bienvenue sur StudySOS !';
                    msg.className = 'message success';
                } else {
                    btn.textContent = "S'inscrire";
                    btn.classList.remove('loading');
                    const errors = Object.values(result).flat().join(' ');
                    msg.textContent = errors;
                    msg.className = 'message error';
                }
                msg.style.display = 'block';

            } catch (err) {
                btn.textContent = "S'inscrire";
                btn.classList.remove('loading');
                msg.textContent = 'Erreur de connexion au serveur.';
                msg.className = 'message error';
                msg.style.display = 'block';
            }
        }
        
async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const response = await fetch("http://127.0.0.1:8000/api/register/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const result = await response.json();

    if (response.ok) {
        alert("Connexion réussie !");
        window.location.href = "/api/profile-page/";

        // Redirect later to dashboard etc...
    } else {
        alert("Email ou mot de passe incorrect");
    }
}

    </script>
</body>
</html>
