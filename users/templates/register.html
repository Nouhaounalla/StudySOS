{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySOS — Inscription</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    
<div class="card" id="register-box">
    <h1> StudySOS</h1>
    <p class="subtitle">Créez votre compte gratuitement</p>

    <div class="input-group">
        <input type="text" id="username" placeholder=" " oninput="validate('username')">
        <label for="username">Nom d'utilisateur</label>
        <span class="error-msg" id="username-err"></span>
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder=" " oninput="validate('email')">
        <label for="email">Email</label>
        <span class="error-msg" id="email-err"></span>
    </div>

    <div class="input-group">
        <input type="text" id="phone" placeholder=" ">
        <label for="phone">Téléphone (optionnel)</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder=" " oninput="validate('password')">
        <label for="password">Mot de passe</label>
        <span class="error-msg" id="password-err"></span>
    </div>

    <button id="submit-btn" onclick="register()">S'inscrire</button>

    <div class="message" id="msg-connexion"></div>

    <div class="login-link">Déjà inscrit ?
        <a href="#" id="show-login">Se connecter</a>
    </div>
</div>

<div class="card" id="login-box" style="display:none;">
    <h1>Connexion</h1>
    <p class="subtitle">Heureux de vous revoir </p>

    <div class="input-group">
        <input type="email" id="login-email" placeholder=" ">
        <label for="login-email">Email</label>
    </div>

    <div class="input-group">
        <input type="password" id="login-password" placeholder=" ">
        <label for="login-password">Mot de passe</label>
    </div>

    <button type="button" id="btn-connexion" onclick="login()">Se connecter</button>

    <div class="login-link">Pas encore de compte ?
        <a href="#" id="show-register">Créer un compte</a>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://127.0.0.1:8000/api/users';
    
    function getCsrfToken() {
        const name = 'csrftoken';
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    document.getElementById('show-login').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('register-box').style.display = 'none';
        document.getElementById('login-box').style.display = 'block';
    });
    
    document.getElementById('show-register').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('register-box').style.display = 'block';
    });
    
    function validate(field) {
        const value = document.getElementById(field).value;
        const errElement = document.getElementById(field + '-err');
        let isValid = true;
        let message = '';
        
        if (field === 'username') {
            if (value.length < 3) {
                isValid = false;
                message = 'Minimum 3 caractères';
            }
        } else if (field === 'email') {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(value)) {
                isValid = false;
                message = 'Email invalide';
            }
        } else if (field === 'password') {
            if (value.length < 8) {
                isValid = false;
                message = 'Minimum 8 caractères';
            }
        }
        
        if (errElement) {
            errElement.textContent = message;
        }
        return isValid;
    }
    
    async function register() {
        const isUsernameValid = validate('username');
        const isEmailValid = validate('email');
        const isPasswordValid = validate('password');
        
        if (!isUsernameValid || !isEmailValid || !isPasswordValid) {
            showMessage('Veuillez corriger les erreurs', 'error');
            return;
        }
        
        const data = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value || ''
        };
        
        try {
            const response = await fetch(`${API_BASE_URL}/register/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                credentials: 'include',
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showMessage('Inscription réussie ! Connexion...', 'success');
                setTimeout(async () => {
                    await login(data.email, data.password);
                }, 1000);
            } else {
                showMessage(result.message || result.detail || 'Erreur lors de l\'inscription', 'error');
            }
        } catch (error) {
            console.error('Register error:', error);
            showMessage('Erreur de connexion au serveur', 'error');
        }
    }
    
    async function login(email = null, password = null) {
        const loginEmail = email || document.getElementById('login-email').value;
        const loginPassword = password || document.getElementById('login-password').value;
        
        if (!loginEmail || !loginPassword) {
            showMessage('Veuillez remplir tous les champs', 'error', 'login');
            return false;
        }
        
        try {
            const response = await fetch(`${API_BASE_URL}/login/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                credentials: 'include',
                body: JSON.stringify({ 
                    email: loginEmail, 
                    password: loginPassword 
                })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showMessage('Connexion réussie !', 'success', 'login');
                const redirectUrl = result.redirect_url || '/api/users/profile_info/';
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 500);
                return true;
            } else {
                showMessage(result.message || result.detail || 'Email ou mot de passe incorrect', 'error', 'login');
                return false;
            }
        } catch (error) {
            console.error('Login error:', error);
            showMessage('Erreur de connexion au serveur', 'error', 'login');
            return false;
        }
    }
    
    function showMessage(msg, type, context = 'register') {
        const msgId = context === 'login' ? 'msg-connexion' : 'msg-connexion';
        const element = document.getElementById(msgId);
        if (element) {
            element.textContent = msg;
            element.className = 'message ' + type;
            setTimeout(() => {
                element.textContent = '';
                element.className = 'message';
            }, 5000);
        }
    }
</script>
</body>
</html>
