{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil — StudySOS</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>

<body>

<div class="card profile-card slide-in">
    <h1>Mon Profil</h1>
    <p class="subtitle">Bienvenue sur votre espace personnel</p>

    <div class="avatar-container">
        <img id="avatar" src="{% static 'img/avatar.png' %}" alt="Avatar">
        <h2 id="username-display">Utilisateur</h2>
        <p id="email-display" class="email"></p>
    </div>

    <div class="info-section">
        <h3>Informations du compte</h3>

        <div class="info-line">
            <label>Nom d'utilisateur :</label>
            <span id="username-info"></span>
        </div>

        <div class="info-line">
            <label>Email :</label>
            <span id="email-info"></span>
        </div>

        <div class="info-line">
            <label>Téléphone :</label>
            <span id="phone-info"></span>
        </div>
    </div>

    <button id="logout-btn">Se déconnecter</button>
</div>


<script>
    // ✅ Load JWT token from login
    const token = localStorage.getItem("access");

    if (!token) {
        window.location.href = "/";
    }

    // ✅ Fetch user info from your Django API
    async function loadProfile() {
        try {
            const response = await fetch("http://127.0.0.1:8000/api/users/me/", {
                headers: { "Authorization": "Bearer " + token }
            });

            const user = await response.json();

            // ✅ Update profile content
            document.getElementById("username-display").textContent = user.username;
            document.getElementById("email-display").textContent = user.email;

            document.getElementById("username-info").textContent = user.username;
            document.getElementById("email-info").textContent = user.email;
            document.getElementById("phone-info").textContent = user.phone || "Non spécifié";

        } catch (err) {
            console.error(err);
            alert("Erreur : impossible de charger votre profil.");
        }
    }

    loadProfile();

    // ✅ Logout
    document.getElementById("logout-btn").onclick = function () {
        localStorage.removeItem("access");
        localStorage.removeItem("refresh");
        window.location.href = "/";
    };

</script>

</body>
</html>
