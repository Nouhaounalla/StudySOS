{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin – StudySOS{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      📚 StudySOS<span>Administration</span>
    </div>
    <nav class="admin-nav">
      <a href="/admin-panel/" class="admin-nav-item {% block nav_dash %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tableau de bord
      </a>
      <a href="/admin-panel/users/" class="admin-nav-item {% block nav_users %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Utilisateurs
      </a>
      <a href="/admin-panel/questions/" class="admin-nav-item {% block nav_questions %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Questions
      </a>
      <a href="/admin-panel/tutoringsessions/" class="admin-nav-item {% block nav_tutoringsessions %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Tutoringsessions
      </a>
      <a href="/admin-panel/reports/" class="admin-nav-item {% block nav_reports %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        Signalements
      </a>
      <a href="/admin-panel/statistics/" class="admin-nav-item {% block nav_stats %}{% endblock %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Statistiques
      </a>
    </nav>
    <div style="padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,.08);">
      <a href="/" style="display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.5);font-size:.85rem;">← Site public</a>
    </div>
  </aside>

  <main class="admin-content">
    {% block content %}{% endblock %}
  </main>
</div>
<div id="toast-container"></div>
<script src="{% static 'js/api.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
