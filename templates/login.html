<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StudySOS — Login</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f9b8e, #00d2a8, #38ef7d);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .card {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 8px 20px rgba(0,180,140,0.3);
        width: 100%;
        max-width: 420px;
    }
    h1 { color: #0f9b8e; text-align: center; margin-bottom: 1.5rem; font-size: 28px; }
    input {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #0f9b8e; }
    button {
        width: 100%;
        padding: 0.9rem;
        background: linear-gradient(135deg, #0f9b8e, #38ef7d);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    #message { margin-top: 1rem; text-align: center; color: #e74c3c; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
    <h1>StudySOS</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div id="message"></div>
</div>
<script>
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');

    try {
        const res = await fetch('/api/token/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('access', data.access);
            localStorage.setItem('refresh', data.refresh);
            window.location.href = '/questions-page/';
        } else {
            msg.innerText = 'Email ou mot de passe incorrect';
        }
    } catch (err) {
        msg.innerText = 'Erreur serveur';
    }
}
</script>
</body>
</html>
