{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySOS – Connexion</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0bceae 0%, #00d2a8 40%, #1de87a 100%);
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem;
    }
    .auth-card {
      background: white; border-radius: 20px;
      padding: 2.5rem 2.25rem; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.12);
    }
    .card-title { font-size: 1.6rem; font-weight: 700; color: #0bceae; margin-bottom: .3rem; }
    .card-subtitle { font-size: .9rem; color: #94a3b8; margin-bottom: 1.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-input {
      width: 100%; padding: .75rem 1rem;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: .92rem; font-family: inherit; color: #0f172a;
      outline: none; transition: border-color .2s; background: white;
    }
    .form-input:focus { border-color: #0bceae; box-shadow: 0 0 0 3px rgba(11,206,174,.1); }
    .form-input::placeholder { color: #cbd5e1; }
    .form-input.error { border-color: #ef4444; }
    .field-error { font-size: .78rem; color: #ef4444; margin-top: .3rem; display: none; }
    .field-error.visible { display: block; }
    .btn-submit {
      width: 100%; padding: .85rem;
      background: linear-gradient(90deg, #0bceae, #1de87a);
      color: white; border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: .5rem;
      transition: opacity .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-submit:hover { opacity: .92; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .switch-link { text-align: center; margin-top: 1.25rem; font-size: .88rem; color: #64748b; }
    .switch-link a { color: #0bceae; font-weight: 600; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }
    .alert-error {
      background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 8px; padding: .75rem 1rem; font-size: .85rem;
      margin-bottom: 1rem; display: none;
    }
    .alert-error.visible { display: block; }
    .spinner {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: white; border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #register-page { display: none; }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="auth-card">
      <div class="card-title">Connexion</div>
      <div class="card-subtitle">Heureux de vous revoir</div>
      <div class="alert-error" id="login-error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <input type="email" id="login-email" class="form-input" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" class="form-input" placeholder="Mot de passe" required>
        </div>
        <button type="submit" class="btn-submit" id="login-btn">Se connecter</button>
      </form>
      <div class="switch-link">
        Pas encore de compte ? <a href="#" onclick="showRegister()">Créer un compte</a>
      </div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="register-page">
    <div class="auth-card">
      <div class="card-title">StudySOS</div>
      <div class="card-subtitle">Créez votre compte gratuitement</div>
      <div class="alert-error" id="reg-error"></div>
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <input type="text" id="reg-username" class="form-input" placeholder="Nom d'utilisateur" required minlength="3" oninput="validateField(this,3,'err-username')">
          <div class="field-error" id="err-username">Minimum 3 caractères</div>
        </div>
        <div class="form-group">
          <input type="email" id="reg-email" class="form-input" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="tel" id="reg-phone" class="form-input" placeholder="Téléphone (optionnel)">
        </div>
        <div class="form-group">
          <input type="password" id="reg-password" class="form-input" placeholder="Mot de passe" required minlength="8" oninput="validateField(this,8,'err-password')">
          <div class="field-error" id="err-password">Minimum 8 caractères</div>
        </div>
        <input type="hidden" id="reg-role" value="etudiant">
        <button type="submit" class="btn-submit" id="reg-btn">S'inscrire</button>
      </form>
      <div class="switch-link">
        Déjà inscrit ? <a href="#" onclick="showLogin()">Se connecter</a>
      </div>
    </div>
  </div>

<div id="toast-container"></div>
<script src="{% static 'js/api.js' %}"></script>
<script>
function showRegister() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('register-page').style.display = 'block';
  history.replaceState(null,'','#register');
}
function showLogin() {
  document.getElementById('register-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'block';
  history.replaceState(null,'','#login');
}
if (window.location.hash === '#register') showRegister(); else showLogin();

function validateField(input, minLen, errId) {
  const invalid = input.value.length > 0 && input.value.length < minLen;
  input.classList.toggle('error', invalid);
  document.getElementById(errId).classList.toggle('visible', invalid);
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  errEl.classList.remove('visible');
  const r = await API.post('/api/users/login/', {
    email: document.getElementById('login-email').value,
    password: document.getElementById('login-password').value,
  });
  btn.innerHTML = 'Se connecter'; btn.disabled = false;
  if (r.ok) { window.location.href = '/profile/'; return; }
  errEl.textContent = r.data.error || 'Email ou mot de passe incorrect.';
  errEl.classList.add('visible');
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-error');
  errEl.classList.remove('visible');
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  if (username.length < 3) { validateField(document.getElementById('reg-username'),3,'err-username'); return; }
  if (password.length < 8) { validateField(document.getElementById('reg-password'),8,'err-password'); return; }
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  const r = await API.post('/api/users/register/', {
    username, email: document.getElementById('reg-email').value,
    phone: document.getElementById('reg-phone').value,
    role: 'etudiant', password, password_confirm: password,
  });
  btn.innerHTML = "S'inscrire"; btn.disabled = false;
  if (r.ok) { window.location.href = '/profile/complete/'; return; }
  errEl.textContent = Object.values(r.data).flat().join(' ') || "Erreur lors de l'inscription.";
  errEl.classList.add('visible');
}
</script>
</body>
</html>
