{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySOS — Mon Profil</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>
    <div class="card">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <h1>StudySOS</h1>
        <p class="subtitle">Complétez votre profil</p>

        <div class="input-group">
            <input type="text" id="first_name" placeholder=" " oninput="updateProgress()">
            <label for="first_name">Prénom</label>
        </div>

        <div class="input-group">
            <input type="text" id="last_name" placeholder=" " oninput="updateProgress()">
            <label for="last_name">Nom de famille</label>
        </div>

        <div class="input-group">
            <input type="date" id="date_of_birth" oninput="updateProgress()">
            <label for="date_of_birth" class="active">Date de naissance</label>
        </div>

        <div class="input-group">
            <select id="role" onchange="updateProgress()">
                <option value="">-- Choisir --</option>
                <option value="etudiant">Étudiant</option>
                <option value="tuteur">Tuteur</option>
            </select>
            <label class="active">Je suis...</label>
        </div>

        <button onclick="saveProfile()">Continuer →</button>
        <div id="message"></div>
    </div>

<script>
const ACCESS_TOKEN = localStorage.getItem('access');

// ✅ CORRECTION ICI
if (!ACCESS_TOKEN) {
    window.location.href = '/login/'; // 🔥 AU LIEU DE /api/users/
}

function authHeaders() {
    return {
        'Authorization': 'Bearer ' + ACCESS_TOKEN,
    };
}

function updateProgress() {
    const fields = ['first_name','last_name','date_of_birth','role'];
    const filled = fields.filter(f => document.getElementById(f).value.trim() !== '').length;
    document.getElementById('progress-fill').style.width = (filled / fields.length * 100) + '%';
}

async function saveProfile() {
    const msg = document.getElementById('message');

    const data = {
        first_name: document.getElementById('first_name').value,
        last_name: document.getElementById('last_name').value,
        role: document.getElementById('role').value
    };

    try {
        const response = await fetch('/api/users/profile/', {
            method: 'POST',
            headers: {
                ...authHeaders(),
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            msg.innerText = "Profil enregistré ✅";
        } else {
            msg.innerText = JSON.stringify(result);
        }

    } catch (err) {
        msg.innerText = "Erreur serveur ❌";
    }
}
</script>
</body>
</html>
